<!DOCTYPE html>
<html>
<body>
  <div id="container"></div>
  <script>
    const svg = `<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  <path d="M120 150L256 380L392 150H120Z" fill="white" fill-opacity="0.9" />
  <circle cx="256" cy="220" r="40" fill="#00e5ff" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a2e" />
      <stop offset="1" stop-color="#2d0b5a" />
    </linearGradient>
  </defs>
</svg>`;

    function getBase64(size) {
      return new Promise((resolve) => {
        const img = new Image();
        const svgBlob = new Blob([svg], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, size, size);
          resolve(canvas.toDataURL('image/png').split(',')[1]);
        };
        img.src = url;
      });
    }

    window.renderIcons = async () => {
      const i192 = await getBase64(192);
      const i512 = await getBase64(512);
      console.log('ICON192:' + i192);
      console.log('ICON512:' + i512);
    };
  </script>
</body>
</html>
