name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Verify server boots
        run: |
          PORT=3100 node server.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:3100/ -o /dev/null && echo "server responded OK"
          kill $SERVER_PID
