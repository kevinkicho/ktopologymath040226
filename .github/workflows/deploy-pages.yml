name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.opencode' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='tests' \
            --exclude='test-results' \
            --exclude='docs' \
            --exclude='_site' \
            --exclude='*.py' \
            --exclude='server.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='playwright.config.js' \
            --exclude='firebase.json' \
            --exclude='firebase-config*' \
            --exclude='database.rules.json' \
            --exclude='firestore.rules' \
            --exclude='storage.rules' \
            --exclude='autoresearch.jsonl' \
            --exclude='autoresearch.md' \
            --exclude='README.md' \
            ./ _site/
          echo "--- staged top-level files ---"
          ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
