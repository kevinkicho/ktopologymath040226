<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Paths &#8212; Road to Reality</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050f;--bg2:#0b0b1e;--bg3:#111128;
  --border:#1c1c44;--text:#c0c0ea;--dim:#55558a;
  --cyan:#00e5ff;--gold:#ffd700;--green:#00ff99;
  --pink:#ff44ff;--orange:#ff8844;--blue:#5599ff;
}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}

.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:14px;
  padding:12px 24px;
  background:rgba(5,5,15,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.72rem;color:var(--dim);text-decoration:none;
  letter-spacing:.06em;text-transform:uppercase;transition:.15s;flex-shrink:0;
}
.back-link:hover{color:var(--cyan)}
.top-title{font-size:1rem;font-weight:700;letter-spacing:.04em;color:var(--text)}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}

.signin-banner{
  background:rgba(255,215,0,.04);border-bottom:1px solid rgba(255,215,0,.15);
  padding:8px 24px;font-size:.74rem;color:var(--dim);
  display:flex;align-items:center;gap:12px;
}
.signin-banner.hidden{display:none}
.signin-btn{
  padding:4px 14px;border-radius:5px;border:1px solid rgba(255,215,0,.3);
  background:rgba(255,215,0,.08);color:var(--gold);font-size:.72rem;
  cursor:pointer;transition:.15s;font-family:inherit;
}
.signin-btn:hover{background:rgba(255,215,0,.16);border-color:var(--gold)}
.signin-dismiss{
  margin-left:auto;color:var(--dim);cursor:pointer;font-size:.8rem;
  background:none;border:none;padding:2px 6px;
}

.paths-section{padding:30px 32px 20px;max-width:1100px;margin:0 auto}
.section-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--dim);margin-bottom:18px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.path-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:30px}
.path-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;
}
.path-card:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,0,0,.4)}
.path-card.expanded{border-color:var(--pc,var(--cyan))}
.pc-header{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.pc-icon{font-size:1.6rem;width:44px;height:44px;display:flex;align-items:center;
  justify-content:center;border-radius:10px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);flex-shrink:0}
.pc-info{flex:1}
.pc-title{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:2px}
.pc-subtitle{font-size:.68rem;color:var(--dim)}
.pc-desc{font-size:.76rem;color:var(--dim);line-height:1.55;margin-bottom:12px}

.pc-progress{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pc-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pc-bar{height:100%;border-radius:3px;transition:width .4s ease}
.pc-stats{font-size:.68rem;color:var(--dim);white-space:nowrap}

.pc-continue{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:6px;
  border:1px solid var(--pc,var(--cyan));
  background:transparent;
  color:var(--pc,var(--cyan));font-size:.76rem;font-weight:600;
  cursor:pointer;transition:.15s;text-decoration:none;font-family:inherit;
}
.pc-continue:hover{background:rgba(255,255,255,.04)}

.pc-modules{
  max-height:0;overflow:hidden;transition:max-height .35s ease;margin-top:0;
}
.path-card.expanded .pc-modules{max-height:800px;margin-top:14px}
.pm-item{
  display:flex;align-items:center;gap:10px;padding:7px 8px;
  border-radius:5px;transition:.12s;font-size:.78rem;
}
.pm-item:hover{background:rgba(255,255,255,.03)}
.pm-check{
  width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:.7rem;color:transparent;transition:.15s;
}
.pm-check.visited{border-color:var(--dim);color:var(--dim)}
.pm-check.completed{border-color:var(--green);background:rgba(0,255,153,.12);color:var(--green)}
.pm-num{font-size:.68rem;color:var(--dim);width:24px;text-align:right;flex-shrink:0}
.pm-name{color:var(--text);flex:1}
.pm-name a{color:inherit;text-decoration:none;transition:.12s}
.pm-name a:hover{color:var(--cyan)}

.overall-stats{
  padding:16px 24px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;margin-bottom:20px;display:flex;gap:30px;flex-wrap:wrap;
}
.os-item{text-align:center}
.os-num{font-size:1.4rem;font-weight:700;color:var(--cyan)}
.os-label{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="back-link">&larr; Home</a>
  <span class="top-title">Learning Paths</span>
  <div class="top-right">
    <span id="authStatus" style="font-size:.68rem;color:var(--dim)"></span>
  </div>
</div>

<div class="signin-banner" id="signinBanner">
  <span>Sign in with Google to sync your progress across devices</span>
  <button class="signin-btn" id="signinBtn">Sign in with Google</button>
  <button class="signin-dismiss" id="signinDismiss">&times;</button>
</div>

<div class="paths-section">
  <div class="overall-stats" id="overallStats">
    <div class="os-item"><div class="os-num" id="osVisited">0</div><div class="os-label">Visited</div></div>
    <div class="os-item"><div class="os-num" id="osCompleted">0</div><div class="os-label">Completed</div></div>
    <div class="os-item"><div class="os-num" id="osTotal">63</div><div class="os-label">Total Modules</div></div>
  </div>

  <div class="section-title">Penrose's Road</div>
  <div class="path-cards" id="bookPaths"></div>

  <div class="section-title">Thematic Journeys</div>
  <div class="path-cards" id="themePaths"></div>
</div>

<script src="paths-data.js"></script>
<script src="firebase-progress.js"></script>
<script>
(function() {
  'use strict';

  window.localProgress.init();

  var bookContainer = document.getElementById('bookPaths');
  var themeContainer = document.getElementById('themePaths');

  function moduleName(id) {
    return window.moduleDisplayName ? window.moduleDisplayName(id) : id;
  }

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text) e.textContent = text;
    return e;
  }

  function renderCard(path, container) {
    var card = el('div', 'path-card');
    card.style.setProperty('--pc', path.color);

    // Header
    var header = el('div', 'pc-header');
    var icon = el('div', 'pc-icon', path.icon);
    var info = el('div', 'pc-info');
    var title = el('div', 'pc-title', path.title);
    var subtitle = el('div', 'pc-subtitle', path.subtitle);
    info.appendChild(title);
    info.appendChild(subtitle);
    header.appendChild(icon);
    header.appendChild(info);
    card.appendChild(header);

    // Description
    card.appendChild(el('div', 'pc-desc', path.description));

    // Progress bar
    var progWrap = el('div', 'pc-progress');
    var barWrap = el('div', 'pc-bar-wrap');
    var bar = el('div', 'pc-bar');
    bar.setAttribute('data-path', path.id);
    bar.style.width = '0%';
    bar.style.background = path.color;
    barWrap.appendChild(bar);
    progWrap.appendChild(barWrap);
    var stats = el('span', 'pc-stats', '0/' + path.modules.length);
    stats.setAttribute('data-path-stats', path.id);
    progWrap.appendChild(stats);
    card.appendChild(progWrap);

    // Continue button
    var btnRow = el('div');
    btnRow.style.cssText = 'display:flex;align-items:center;gap:10px';
    var contBtn = el('button', 'pc-continue', '\u25b6 Start');
    contBtn.setAttribute('data-path-continue', path.id);
    btnRow.appendChild(contBtn);
    card.appendChild(btnRow);

    // Module list (hidden until expanded)
    var modList = el('div', 'pc-modules');
    modList.setAttribute('data-path-modules', path.id);
    card.appendChild(modList);

    // Toggle expand
    card.addEventListener('click', function(e) {
      if (e.target.closest('.pc-continue') || e.target.closest('.pm-name')) return;
      card.classList.toggle('expanded');
      if (card.classList.contains('expanded') && modList.childElementCount === 0) {
        renderModuleList(path, modList);
      }
    });

    // Continue button action
    contBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      window.localProgress.setActivePath(path.id);
      var pp = window.localProgress.getPathProgress(path.id);
      var next = null;
      for (var i = 0; i < pp.modules.length; i++) {
        if (!pp.modules[i].completed) { next = pp.modules[i]; break; }
      }
      window.location.href = '/' + (next ? next.id : path.modules[0]) + '.html';
    });

    container.appendChild(card);
  }

  function renderModuleList(path, container) {
    container.textContent = '';
    var progress = window.localProgress.getProgress();
    path.modules.forEach(function(modId) {
      var p = progress[modId] || {};
      var item = el('div', 'pm-item');

      var checkClass = 'pm-check';
      var checkText = '';
      if (p.completed) { checkClass += ' completed'; checkText = '\u2713'; }
      else if (p.visited) { checkClass += ' visited'; checkText = '\u00b7'; }
      var check = el('div', checkClass, checkText);
      item.appendChild(check);

      var num = el('span', 'pm-num', modId.match(/^\d+/)[0]);
      item.appendChild(num);

      var nameSpan = el('span', 'pm-name');
      var link = document.createElement('a');
      link.href = '/' + modId + '.html';
      link.textContent = moduleName(modId);
      link.addEventListener('click', function(e) {
        e.stopPropagation();
        window.localProgress.setActivePath(path.id);
      });
      nameSpan.appendChild(link);
      item.appendChild(nameSpan);

      container.appendChild(item);
    });
  }

  function updateProgressUI() {
    var progress = window.localProgress.getProgress();
    var totalVisited = 0, totalCompleted = 0;
    var keys = Object.keys(progress);
    for (var i = 0; i < keys.length; i++) {
      if (progress[keys[i]].visited) totalVisited++;
      if (progress[keys[i]].completed) totalCompleted++;
    }
    document.getElementById('osVisited').textContent = totalVisited;
    document.getElementById('osCompleted').textContent = totalCompleted;

    var paths = window.LEARNING_PATHS || [];
    for (var j = 0; j < paths.length; j++) {
      var path = paths[j];
      var pp = window.localProgress.getPathProgress(path.id);
      var bar = document.querySelector('[data-path="' + path.id + '"]');
      var stats = document.querySelector('[data-path-stats="' + path.id + '"]');
      var contBtn = document.querySelector('[data-path-continue="' + path.id + '"]');
      if (bar) bar.style.width = (pp.total > 0 ? pp.completed / pp.total * 100 : 0) + '%';
      if (stats) stats.textContent = pp.completed + '/' + pp.total;
      if (contBtn) {
        contBtn.textContent = pp.completed === 0 ? '\u25b6 Start' :
                              pp.completed >= pp.total ? '\u2713 Review' : '\u25b6 Continue';
      }
    }
  }

  // Render all path cards
  var paths = window.LEARNING_PATHS || [];
  for (var i = 0; i < paths.length; i++) {
    if (paths[i].type === 'book') renderCard(paths[i], bookContainer);
    else renderCard(paths[i], themeContainer);
  }

  // Update progress once ready
  window.localProgress.onReady(function() {
    updateProgressUI();
  });

  // Hide cloud sync banner (no longer available)
  document.getElementById('signinBanner').classList.add('hidden');

  document.getElementById('signinDismiss').addEventListener('click', function() {
    document.getElementById('signinBanner').classList.add('hidden');
    sessionStorage.setItem('kmath-signin-dismissed', '1');
  });

  if (sessionStorage.getItem('kmath-signin-dismissed')) {
    document.getElementById('signinBanner').classList.add('hidden');
  }
})();
</script>
</body>
</html>
